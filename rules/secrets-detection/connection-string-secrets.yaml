rules:
  - id: manicode.secrets.connection-string-postgresql
    message: >-
      Hardcoded credentials detected in PostgreSQL connection string.
      Use environment variables or a secrets manager instead of embedding
      passwords directly in connection URIs.
    severity: WARNING
    languages:
      - generic
    pattern-regex: "postgresql://[^:/@\\s]+:[^@\\s]+@[^\\s]+"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM

  - id: manicode.secrets.connection-string-mysql
    message: >-
      Hardcoded credentials detected in MySQL connection string.
      Use environment variables or a secrets manager instead of embedding
      passwords directly in connection URIs.
    severity: WARNING
    languages:
      - generic
    pattern-regex: "mysql://[^:/@\\s]+:[^@\\s]+@[^\\s]+"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM

  - id: manicode.secrets.connection-string-mongodb
    message: >-
      Hardcoded credentials detected in MongoDB connection string.
      Use environment variables or a secrets manager instead of embedding
      passwords directly in connection URIs.
    severity: WARNING
    languages:
      - generic
    pattern-regex: "mongodb(\\+srv)?://[^:/@\\s]+:[^@\\s]+@[^\\s]+"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
