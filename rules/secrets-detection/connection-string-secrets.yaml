  - id: manicode.secrets.connection-string-jdbc
    message: >-
      Hardcoded credentials detected in JDBC connection string.
      The password parameter contains a literal value. Use environment
      variables or a secrets manager instead.
    severity: WARNING
    languages:
      - generic
    pattern-regex: "jdbc:[a-zA-Z0-9]+://[^\\s]*[?&]password=[^&\\s]+"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM

  - id: manicode.secrets.connection-string-amqp
