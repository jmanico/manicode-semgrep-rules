rules:
  - id: manicode.secrets.terraform-hardcoded-secret
    message: >-
      Terraform variable with a hardcoded default value for a secret.
      Never set default values for sensitive variables such as passwords,
      API keys, or tokens. Use input variables without defaults or pull
      values from a secrets manager.
    severity: WARNING
    languages:
      - hcl
    patterns:
      - pattern: |
          variable "..." {
            ...
            default = "$VALUE"
            ...
          }
      - metavariable-regex:
          metavariable: $VALUE
          regex: ".+"
      - pattern-inside: |
          variable "$NAME" {
            ...
          }
      - metavariable-regex:
          metavariable: $NAME
          regex: ".*(password|secret|api_key|api_secret|token|private_key|access_key|auth|credential).*"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM
      technology:
        - terraform

  - id: manicode.secrets.kubernetes-hardcoded-secret
    message: >-
      Kubernetes Secret manifest contains hardcoded data values.
      Use sealed-secrets, external-secrets-operator, or a secrets manager
      to inject secrets at deployment time rather than storing them in
      plain manifest files.
    severity: WARNING
    languages:
      - yaml
    patterns:
      - pattern: |
          kind: Secret
          ...
          data:
            ...
            $KEY: $VALUE
      - metavariable-regex:
          metavariable: $VALUE
          regex: "[A-Za-z0-9+/=]{8,}"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM
      technology:
        - kubernetes

  - id: manicode.secrets.docker-compose-env-password
    message: >-
      Docker Compose file contains a hardcoded password, secret, or API key
      in an environment variable. Use Docker secrets, .env files excluded
      from version control, or a secrets manager instead.
    severity: WARNING
    languages:
      - yaml
    pattern-regex: "\\b(PASSWORD|SECRET|API_KEY|APIKEY|SECRET_KEY|AUTH_TOKEN|ACCESS_TOKEN|PRIVATE_KEY)\\s*[:=]\\s*['\"]?[^\\s'\"${}][^\\s'\"]*"
    metadata:
      category: security
      subcategory:
        - audit
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM
      technology:
        - docker-compose
