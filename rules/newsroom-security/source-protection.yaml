  # ---------------------------------------------------------------------------
  # Analytics tracking in tip/securedrop handlers — Python
  # ---------------------------------------------------------------------------
  - id: manicode.newsroom.analytics-in-tip-handler-python
    message: >-
      Analytics or tracking code detected inside a tip-submission or
      SecureDrop handler.  Third-party analytics services can leak source
      IP addresses, browser fingerprints, and behavioral data to external
      parties, undermining source confidentiality.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: analytics.track(...)
          - pattern: analytics.identify(...)
          - pattern: analytics.page(...)
          - pattern: gtag(...)
          - pattern: mixpanel.track(...)
          - pattern: mixpanel.people.set(...)
      - pattern-inside: |
          @$APP.route("=~/(?i).*(tip|securedrop|whistleblower|submit_tip).*/")
          def $FUNC(...):
              ...
    metadata:
      category: security
      subcategory:
        - audit
      technology:
        - python

