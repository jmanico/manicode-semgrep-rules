      - pattern: $DB.raw("=~/(?i).*(source|tipster).*JOIN.*(article|story|content|stories|articles).*/", ...)
      - pattern: $DB.raw("=~/(?i).*(article|story|content|stories|articles).*JOIN.*(source|tipster).*/", ...)
      - pattern: $POOL.query("=~/(?i).*(source|tipster).*JOIN.*(article|story|content|stories|articles).*/", ...)
      - pattern: $POOL.query("=~/(?i).*(article|story|content|stories|articles).*JOIN.*(source|tipster).*/", ...)
