rules:
  # ---------------------------------------------------------------------------
  # Source-identity logging — Python
  # ---------------------------------------------------------------------------
  - id: manicode.newsroom.source-identity-logged-python
    message: >-
      Source-identifying information is being written to logs.  Logging
      variables such as source, tipster, whistleblower, informant, or
      source-contact fields can expose confidential sources if logs are
      compromised, subpoenaed, or leaked.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: logging.$METHOD(..., $SOURCE, ...)
          - pattern: logging.$METHOD(... + $SOURCE + ...)
          - pattern: logging.$METHOD(f"...{$SOURCE}...")
          - pattern: logging.$METHOD("..." % $SOURCE)
          - pattern: logging.$METHOD("...".format(..., $SOURCE, ...))
          - pattern: logger.$METHOD(..., $SOURCE, ...)
          - pattern: logger.$METHOD(... + $SOURCE + ...)
          - pattern: logger.$METHOD(f"...{$SOURCE}...")
          - pattern: logger.$METHOD("..." % $SOURCE)
          - pattern: logger.$METHOD("...".format(..., $SOURCE, ...))
          - pattern: print(..., $SOURCE, ...)
          - pattern: print(... + $SOURCE + ...)
          - pattern: print(f"...{$SOURCE}...")
      - metavariable-regex:
          metavariable: $SOURCE
          regex: (?i).*(source|tipster|whistleblower|informant|source_ip|source_phone|source_email|source_name).*
    metadata:
      category: security
      subcategory:
        - audit
      technology:
        - python
      references:
        - https://freedom.press/training/protecting-sources/

  # ---------------------------------------------------------------------------
  # Source-identity logging — JavaScript / TypeScript
  # ---------------------------------------------------------------------------
  - id: manicode.newsroom.source-identity-logged-js
    message: >-
      Source-identifying information is being written to logs.  Logging
      variables such as source, tipster, whistleblower, informant, or
      source-contact fields can expose confidential sources if logs are
      compromised, subpoenaed, or leaked.
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: console.$METHOD(..., $SOURCE, ...)
          - pattern: console.$METHOD(... + $SOURCE + ...)
          - pattern: console.$METHOD(`...${$SOURCE}...`)
          - pattern: logger.$METHOD(..., $SOURCE, ...)
          - pattern: logger.$METHOD(... + $SOURCE + ...)
          - pattern: logger.$METHOD(`...${$SOURCE}...`)
          - pattern: log.$METHOD(..., $SOURCE, ...)
          - pattern: log.$METHOD(... + $SOURCE + ...)
          - pattern: log.$METHOD(`...${$SOURCE}...`)
      - metavariable-regex:
          metavariable: $SOURCE
          regex: (?i).*(source|tipster|whistleblower|informant|source_ip|source_phone|source_email|source_name).*
    metadata:
      category: security
      subcategory:
        - audit
      technology:
        - javascript
        - typescript
      references:
        - https://freedom.press/training/protecting-sources/

  # ---------------------------------------------------------------------------
  # Database join leaking source identity — Python
  # ---------------------------------------------------------------------------
  - id: manicode.newsroom.source-article-table-join-python
    message: >-
      A database query joins or selects from both source/tipster tables and
      article/story/content tables.  This correlation can de-anonymize
      confidential sources if the query results are cached, logged, or
      exposed through an API.
    severity: WARNING
    languages: [python]
    pattern-either:
      - pattern: $CURSOR.execute("=~/(?i).*(source|tipster).*JOIN.*(article|story|content|stories|articles).*/", ...)
      - pattern: $CURSOR.execute("=~/(?i).*(article|story|content|stories|articles).*JOIN.*(source|tipster).*/", ...)
      - pattern: $DB.query("=~/(?i).*(source|tipster).*JOIN.*(article|story|content|stories|articles).*/", ...)
      - pattern: $DB.query("=~/(?i).*(article|story|content|stories|articles).*JOIN.*(source|tipster).*/", ...)
      - pattern: $DB.raw("=~/(?i).*(source|tipster).*JOIN.*(article|story|content|stories|articles).*/", ...)
      - pattern: $DB.raw("=~/(?i).*(article|story|content|stories|articles).*JOIN.*(source|tipster).*/", ...)
    metadata:
      category: security
      subcategory:
        - audit
      technology:
        - python

