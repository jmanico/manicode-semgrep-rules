  # ---------------------------------------------------------------
  # 3. Dangerous functions in LLM tool definitions — Python
  # ---------------------------------------------------------------
  - id: manicode.llm-api-misuse.dangerous-tool-function-python
    languages: [python]
    severity: ERROR
    message: >-
      An LLM tool/function definition maps to a dangerous function such as
      eval(), exec(), os.system(), or subprocess. If the LLM invokes this
      tool with attacker-influenced arguments, it enables remote code
      execution. Tool functions should be narrowly scoped and never expose
      raw code execution primitives.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      confidence: MEDIUM
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          {"type": "function", "function": {..., "name": "eval", ...}}
      - pattern: |
          {"type": "function", "function": {..., "name": "exec", ...}}
      - pattern: |
          {"type": "function", "function": {..., "name": "os.system", ...}}
      - pattern: |
          {"type": "function", "function": {..., "name": "subprocess", ...}}

  - id: manicode.llm-api-misuse.tool-calls-eval-python
    languages: [python]
    severity: ERROR
    message: >-
      LLM tool call arguments are passed directly to eval(), exec(),
      os.system(), or subprocess. This enables remote code execution if the
      LLM is manipulated through prompt injection. Validate and constrain
      tool call arguments before execution.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
      confidence: HIGH
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          $ARGS = json.loads($TOOL_CALL.function.arguments)
          ...
          eval($ARGS[...])
      - pattern: |
          $ARGS = json.loads($TOOL_CALL.function.arguments)
          ...
          exec($ARGS[...])
      - pattern: |
          $ARGS = json.loads($TOOL_CALL.function.arguments)
          ...
          os.system($ARGS[...])
      - pattern: |
          $ARGS = json.loads($TOOL_CALL.function.arguments)
          ...
          subprocess.run($ARGS[...], ...)
      - pattern: |
          $ARGS = json.loads($TOOL_CALL.function.arguments)
          ...
          subprocess.call($ARGS[...], ...)

  # ---------------------------------------------------------------
  # 4. Dangerous functions in LLM tool definitions — JavaScript
  # ---------------------------------------------------------------
  - id: manicode.llm-api-misuse.tool-calls-eval-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      LLM tool call arguments are passed directly to eval() or exec(). This
      enables remote code execution if the LLM is manipulated through prompt
      injection. Validate and constrain tool call arguments.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code ('Eval Injection')"
      confidence: HIGH
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          $ARGS = JSON.parse($TOOL_CALL.function.arguments)
          ...
          eval($ARGS[$KEY])
      - pattern: |
          $ARGS = JSON.parse($TOOL_CALL.function.arguments)
          ...
          eval($ARGS.$KEY)
      - pattern: |
          $ARGS = JSON.parse($TOOL_CALL.function.arguments)
          ...
          exec($ARGS[$KEY])
      - pattern: |
          $ARGS = JSON.parse($TOOL_CALL.function.arguments)
          ...
          execSync($ARGS[$KEY])
