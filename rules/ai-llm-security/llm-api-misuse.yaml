rules:
  # ---------------------------------------------------------------
  # 1. Hardcoded API keys — Python
  # ---------------------------------------------------------------
  - id: manicode.llm-api-misuse.hardcoded-openai-key-python
    languages: [python]
    severity: ERROR
    message: >-
      OpenAI API key is hardcoded in source code. This exposes the key to
      anyone with access to the codebase and version control history. Use
      environment variables or a secrets manager instead.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      technology:
        - openai
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          openai.api_key = "..."
      - pattern: |
          OpenAI(api_key="...")
      - pattern: |
          openai.OpenAI(api_key="...")
      - pattern: |
          AsyncOpenAI(api_key="...")
      - pattern: |
          $CLIENT = OpenAI(api_key="sk-...")

  - id: manicode.llm-api-misuse.hardcoded-anthropic-key-python
    languages: [python]
    severity: ERROR
    message: >-
      Anthropic API key is hardcoded in source code. This exposes the key to
      anyone with access to the codebase. Use environment variables or a
      secrets manager instead.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      technology:
        - anthropic
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          Anthropic(api_key="...")
      - pattern: |
          anthropic.Anthropic(api_key="...")
      - pattern: |
          AsyncAnthropic(api_key="...")

  - id: manicode.llm-api-misuse.hardcoded-cohere-key-python
    languages: [python]
    severity: ERROR
    message: >-
      Cohere API key is hardcoded in source code. Use environment variables
      or a secrets manager instead.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      technology:
        - cohere
    pattern-either:
      - pattern: |
          cohere.Client(api_key="...")
      - pattern: |
          cohere.Client("...")
      - pattern: |
          cohere.ClientV2(api_key="...")

  # ---------------------------------------------------------------
  # 2. Hardcoded API keys — JavaScript / TypeScript
  # ---------------------------------------------------------------
  - id: manicode.llm-api-misuse.hardcoded-openai-key-javascript
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      OpenAI API key is hardcoded in source code. This exposes the key to
      anyone with access to the codebase. Use environment variables instead.
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      technology:
        - openai
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
    pattern-either:
      - pattern: |
          new OpenAI({apiKey: "..."})
      - pattern: |
          new OpenAI({apiKey: "sk-..."})

