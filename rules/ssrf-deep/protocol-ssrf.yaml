    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: fetch("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: axios.get("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: axios.post("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: axios("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: http.get("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: http.request("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: https.get("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: https.request("=~/^(file|gopher|dict):\/\/.*/", ...)
    metadata:
      category: security
      technology: [javascript, typescript]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # JavaScript – variable with dangerous scheme passed to HTTP client
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.dangerous-protocol-variable-javascript
    message: >-
      A URL variable containing a dangerous protocol scheme (file://, gopher://,
      dict://) is passed to an HTTP client. Validate URL schemes before making
      requests.
    severity: WARNING
