rules:
  # ---------------------------------------------------------------------------
  # Python – dangerous protocol schemes in HTTP client calls
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.dangerous-protocol-scheme-python
    message: >-
      A URL with a dangerous protocol scheme (file://, gopher://, or dict://)
      is passed to an HTTP client. These protocols can be abused for SSRF to
      read local files, interact with internal services, or bypass firewalls.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: requests.$METHOD("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: httpx.$METHOD("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: urllib.request.urlopen("=~/^(file|gopher|dict):\/\/.*/", ...)
          - pattern: urllib.request.Request("=~/^(file|gopher|dict):\/\/.*/", ...)
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # Python – variable with dangerous scheme passed to HTTP client
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.dangerous-protocol-variable-python
    message: >-
      A URL variable containing a dangerous protocol scheme (file://, gopher://,
      dict://) is passed to an HTTP client. Validate URL schemes before making
      requests.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL = "=~/^(file|gopher|dict):\/\/.*/"
                  ...
                  requests.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/^(file|gopher|dict):\/\/.*/"
                  ...
                  httpx.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/^(file|gopher|dict):\/\/.*/"
                  ...
                  urllib.request.urlopen($URL, ...)
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # Python – URL from user input without scheme validation
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.no-scheme-validation-python
    message: >-
      User-supplied URL is passed to an HTTP client without validating the
      scheme. An attacker could use file://, gopher://, or other dangerous
      protocols to perform SSRF. Validate that the URL scheme is http:// or
      https:// before making the request.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: requests.$METHOD(request.$PARAM[$KEY], ...)
          - patterns:
              - pattern: requests.$METHOD(request.args.get(...), ...)
          - patterns:
              - pattern: requests.$METHOD(request.form[$KEY], ...)
          - patterns:
              - pattern: requests.$METHOD(request.json[$KEY], ...)
      - pattern-not-inside: |
          if $URL.startswith("http://") or $URL.startswith("https://"):
              ...
      - pattern-not-inside: |
          $PARSED = urllib.parse.urlparse(...)
          ...
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
