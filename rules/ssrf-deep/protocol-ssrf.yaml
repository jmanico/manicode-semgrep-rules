  # ---------------------------------------------------------------------------
  # Java – dangerous protocol schemes in HTTP client calls
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.dangerous-protocol-scheme-java
    message: >-
      A URL with a dangerous protocol scheme (file://, gopher://, or dict://)
      is used with a Java HTTP client. These protocols can be abused for SSRF
      to read local files or interact with internal services.
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: new URL("=~/^(file|gopher|dict):\/\/.*/").openConnection(...)
          - pattern: new java.net.URL("=~/^(file|gopher|dict):\/\/.*/").openConnection(...)
          - pattern: URI.create("=~/^(file|gopher|dict):\/\/.*/")
          - pattern: java.net.URI.create("=~/^(file|gopher|dict):\/\/.*/")
          - pattern: new URL("=~/^(file|gopher|dict):\/\/.*/").openStream(...)
          - pattern: new java.net.URL("=~/^(file|gopher|dict):\/\/.*/").openStream(...)
    metadata:
      category: security
      technology: [java]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # Java – user input URL without scheme validation
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.no-scheme-validation-java
    message: >-
      User-controlled URL is used to create a connection without validating the
      protocol scheme. An attacker can use file://, gopher://, or other dangerous
      protocols. Validate that the scheme is http or https.
    severity: WARNING
    languages: [java]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL = (String) $REQ.getParameter(...);
                  ...
                  new URL($URL).openConnection(...);
          - patterns:
              - pattern: |
                  $URL = $REQ.getParameter(...);
                  ...
                  new URL($URL).openConnection(...);
          - patterns:
              - pattern: |
                  $URL = (String) $REQ.getParameter(...);
                  ...
                  URI.create($URL);
          - patterns:
              - pattern: |
                  $URL = $REQ.getParameter(...);
                  ...
                  URI.create($URL);
    metadata:
      category: security
      technology: [java]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM
