rules:
  # ---------------------------------------------------------------------------
  # Python – hardcoded metadata endpoint access
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-hardcoded-python
    message: >-
      Direct HTTP request to a cloud metadata endpoint (169.254.169.254 or
      metadata.google.internal). An attacker who controls the URL or any part of
      it can exfiltrate cloud credentials via SSRF.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: requests.get($URL, ...)
          - pattern: requests.post($URL, ...)
          - pattern: requests.put($URL, ...)
          - pattern: requests.request($METHOD, $URL, ...)
          - pattern: httpx.get($URL, ...)
          - pattern: httpx.post($URL, ...)
          - pattern: httpx.AsyncClient().get($URL, ...)
          - pattern: urllib.request.urlopen($URL, ...)
          - pattern: urllib.request.Request($URL, ...)
      - metavariable-regex:
          metavariable: $URL
          regex: (?i).*(169\.254\.169\.254|metadata\.google\.internal).*
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # Python – variable-based URL that resolves to metadata endpoint
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-url-construction-python
    message: >-
      A URL variable containing a cloud metadata address is passed to an HTTP
      client. If this value is constructed from user input, it enables SSRF to
      the cloud metadata service.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  requests.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  requests.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  httpx.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  httpx.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  urllib.request.urlopen($URL, ...)
          - patterns:
              - pattern: |
                  $URL = $VALUE
                  ...
                  urllib.request.urlopen($URL, ...)
      - metavariable-regex:
          metavariable: $VALUE
          regex: (?i).*(169\.254\.169\.254|metadata\.google\.internal).*
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM

