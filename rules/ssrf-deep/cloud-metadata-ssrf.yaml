rules:
  # ---------------------------------------------------------------------------
  # Python – hardcoded metadata endpoint access
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-hardcoded-python
    message: >-
      Direct HTTP request to a cloud metadata endpoint (169.254.169.254 or
      metadata.google.internal). An attacker who controls the URL or any part of
      it can exfiltrate cloud credentials via SSRF.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: requests.get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: requests.post("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: requests.put("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: requests.request($METHOD, "=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: requests.get("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: requests.post("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: requests.put("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: requests.request($METHOD, "=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: httpx.get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: httpx.post("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: httpx.AsyncClient().get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: httpx.get("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: httpx.post("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: httpx.AsyncClient().get("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: urllib.request.urlopen("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: urllib.request.urlopen("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: urllib.request.Request("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: urllib.request.Request("=~/.*metadata\\.google\\.internal.*/", ...)
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # Python – variable-based URL that resolves to metadata endpoint
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-url-construction-python
    message: >-
      A URL variable containing a cloud metadata address is passed to an HTTP
      client. If this value is constructed from user input, it enables SSRF to
      the cloud metadata service.
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL = "=~/.*169\\.254\\.169\\.254.*/"
                  ...
                  requests.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/.*metadata\\.google\\.internal.*/"
                  ...
                  requests.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/.*169\\.254\\.169\\.254.*/"
                  ...
                  httpx.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/.*metadata\\.google\\.internal.*/"
                  ...
                  httpx.$METHOD($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/.*169\\.254\\.169\\.254.*/"
                  ...
                  urllib.request.urlopen($URL, ...)
          - patterns:
              - pattern: |
                  $URL = "=~/.*metadata\\.google\\.internal.*/"
                  ...
                  urllib.request.urlopen($URL, ...)
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM

