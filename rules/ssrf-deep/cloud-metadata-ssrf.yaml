                  http.Get($URL)
          - patterns:
              - pattern: |
                  $URL := "=~/.*169\\.254\\.169\\.254.*/"
                  ...
                  http.NewRequest($METHOD, $URL, ...)
          - patterns:
              - pattern: |
                  $URL := "=~/.*metadata\\.google\\.internal.*/"
                  ...
                  http.NewRequest($METHOD, $URL, ...)
    metadata:
      category: security
      technology: [go]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM
