  # ---------------------------------------------------------------------------
  # JavaScript – variable-based URL to metadata endpoint
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-url-construction-javascript
    message: >-
      A URL variable containing a cloud metadata address is passed to an HTTP
      client. If this value is constructed from user input, it enables SSRF to
      the cloud metadata service.
    severity: WARNING
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL = "=~/.*169\\.254\\.169\\.254.*/";
                  ...
                  fetch($URL, ...);
          - patterns:
              - pattern: |
                  $URL = "=~/.*metadata\\.google\\.internal.*/";
                  ...
                  fetch($URL, ...);
          - patterns:
              - pattern: |
                  $URL = "=~/.*169\\.254\\.169\\.254.*/";
                  ...
                  axios.get($URL, ...);
          - patterns:
              - pattern: |
                  $URL = "=~/.*metadata\\.google\\.internal.*/";
                  ...
                  axios.get($URL, ...);
    metadata:
      category: security
      technology: [javascript, typescript]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # Java – hardcoded metadata endpoint access
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-hardcoded-java
    message: >-
      Direct HTTP request to a cloud metadata endpoint (169.254.169.254 or
      metadata.google.internal). An attacker who controls the URL can exfiltrate
      cloud credentials via SSRF.
    severity: ERROR
    languages: [java]
    patterns:
      - pattern-either:
          - pattern: new java.net.URL("=~/.*169\\.254\\.169\\.254.*/").openConnection(...)
          - pattern: new java.net.URL("=~/.*metadata\\.google\\.internal.*/").openConnection(...)
          - pattern: new URL("=~/.*169\\.254\\.169\\.254.*/").openConnection(...)
          - pattern: new URL("=~/.*metadata\\.google\\.internal.*/").openConnection(...)
          - pattern: java.net.URI.create("=~/.*169\\.254\\.169\\.254.*/")
          - pattern: java.net.URI.create("=~/.*metadata\\.google\\.internal.*/")
          - pattern: URI.create("=~/.*169\\.254\\.169\\.254.*/")
          - pattern: URI.create("=~/.*metadata\\.google\\.internal.*/")
          - pattern: HttpClient.newHttpClient().send(HttpRequest.newBuilder().uri(URI.create("=~/.*169\\.254\\.169\\.254.*/")).build(), ...)
          - pattern: HttpClient.newHttpClient().send(HttpRequest.newBuilder().uri(URI.create("=~/.*metadata\\.google\\.internal.*/")).build(), ...)
    metadata:
      category: security
      technology: [java]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # Go – hardcoded metadata endpoint access
  # ---------------------------------------------------------------------------
  - id: manicode.ssrf.cloud-metadata-hardcoded-go
    message: >-
      Direct HTTP request to a cloud metadata endpoint (169.254.169.254 or
      metadata.google.internal). An attacker who controls the URL can exfiltrate
      cloud credentials via SSRF.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: http.Get("=~/.*169\\.254\\.169\\.254.*/")
          - pattern: http.Get("=~/.*metadata\\.google\\.internal.*/")
          - pattern: http.Post("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: http.Post("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: http.NewRequest($METHOD, "=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: http.NewRequest($METHOD, "=~/.*metadata\\.google\\.internal.*/", ...)
    metadata:
      category: security
