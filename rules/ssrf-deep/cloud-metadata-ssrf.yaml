    severity: WARNING
    languages: [go]
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $URL := "=~/.*169\\.254\\.169\\.254.*/"
                  ...
                  http.Get($URL)
          - patterns:
              - pattern: |
                  $URL := "=~/.*metadata\\.google\\.internal.*/"
