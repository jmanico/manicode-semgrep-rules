          - pattern: axios.get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: axios.post("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: axios.put("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: axios("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: axios.get("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: axios.post("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: axios.put("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: axios("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: fetch("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: fetch("=~/.*metadata\\.google\\.internal.*/", ...)
          - pattern: http.get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: http.request("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: https.get("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: https.request("=~/.*169\\.254\\.169\\.254.*/", ...)
          - pattern: http.get("=~/.*metadata\\.google\\.internal.*/", ...)
